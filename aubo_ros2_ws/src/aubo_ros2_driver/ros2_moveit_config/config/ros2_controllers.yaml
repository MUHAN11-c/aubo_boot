# ROS 2 Controllers configuration for bridge-based control
# This configuration uses demo_driver services instead of direct action interface

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    aubo_e5_controller:
      type: joint_trajectory_controller/JointTrajectoryController
      joints:
        - shoulder_joint
        - upperArm_joint
        - foreArm_joint
        - wrist1_joint
        - wrist2_joint
        - wrist3_joint

      command_interfaces:
        - position
      state_interfaces:
        - position
        - velocity

      state_publish_rate: 50.0
      action_monitor_rate: 20.0


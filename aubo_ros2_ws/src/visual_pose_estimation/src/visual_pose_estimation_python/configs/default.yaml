# 视觉姿态估计默认配置文件

# 相机参数
camera:
  id: "207000152740"
  width: 640
  height: 480

# 预处理参数
preprocessor:
  # 深度图二值化参数（参考trigger_depth.py）
  binary_threshold_min: 0        # 最小深度阈值（原始深度值）
  binary_threshold_max: 65535    # 最大深度阈值（原始深度值）
  enable_zero_interp: 1.0        # 是否启用0值插值（1.0=启用，0.0=禁用）
  
  # 连通域筛选参数
  component_min_area: 1000.0
  component_max_area: 1000000.0
  component_min_aspect_ratio: 0.3
  component_max_aspect_ratio: 4.0
  component_min_width: 60.0
  component_min_height: 60.0
  component_max_count: 10.0

# 特征提取参数
feature_extractor:
  # 连通域初筛参数
  min_component_area: 2000      # 最小连通域面积（像素²）
  max_component_area: 10000000  # 最大连通域面积（像素²）
  
  # 大圆（工件外接圆）提取参数
  big_circle:
    combine_contours: true      # 是否合并多个轮廓
    min_area: 100               # 最小轮廓面积（像素）
  
  # 小圆（阀体外接圆）提取参数
  small_circle:
    erode_kernel: 11            # 腐蚀核大小
    erode_iterations: 5         # 腐蚀迭代次数
    largest_cc: true            # 是否保留最大连通域
    dilate_kernel: 9            # 膨胀核大小
    dilate_iterations: 1        # 膨胀迭代次数
  
  # 线程参数
  max_threads: 8                # 最大线程数

# 旧的背景去除参数（已废弃，保留用于兼容性）
preprocess:
  scale_factor: 1.0
  min_area: 2000
  # 背景去除参数
  background:
    # 边缘采样区域比例（0.05-0.30），用于估计背景色
    border_ratio: 0.08
    # HSV颜色空间阈值
    hue_margin: 12.0
    hue_std_mul: 3.0
    sat_margin: 25.0
    sat_std_mul: 2.0
    val_margin: 35.0
    val_std_mul: 2.0
    # Lab颜色空间阈值
    lab_threshold: 3.5
    # 形态学处理参数
    cleanup_kernel: 7
    foreground_close_kernel: 9
    median_ksize: 5
    # 其他参数
    enable_classic_hsv: true
    use_histogram: true
    min_noise_area: 100
    erode_before_dilate: false
    border_bg_ratio_threshold: 0.7
    component_min_area: 1500
    component_max_area: 80000
    component_min_aspect_ratio: 0.3
    component_max_aspect_ratio: 4.0
    component_min_width: 60
    component_min_height: 60
    component_max_count: 3
  
  # 特征提取参数
  feature_extraction:
    # 连通域筛选参数
    min_component_area: 2000      # 最小连通域面积（像素²）
    max_component_area: 10000000 # 最大连通域面积（像素²）
    # 大圆（工件外接圆）提取参数
    big_circle:
      combine_contours: true     # 是否合并多个轮廓
      min_area: 100              # 最小轮廓面积（像素）
    # 小圆（阀体外接圆）提取参数
    small_circle:
      erode_kernel: 11           # 腐蚀核大小
      erode_iterations: 5        # 腐蚀迭代次数
      largest_cc: true           # 是否保留最大连通域
      dilate_kernel: 9           # 膨胀核大小
      dilate_iterations: 1       # 膨胀迭代次数
    # 线程参数
    max_threads: 8               # 最大线程数

# 算法参数
algorithm:
  # 模板匹配阈值
  match_threshold: 0.85
  # 特征提取参数
  feature_extraction:
    enabled: true
    method: "orb"
  # 暴力匹配参数
  brute_force_matching:
    enabled: true              # 是否启用暴力匹配模式
    angle_step_deg: 1        # 旋转匹配角度步进（度）
    max_threads: 18             # 最大线程数（用于并行处理模板匹配）
    rejection_threshold: 0.4    # 舍弃阈值：所有匹配结果低于此值则判定匹配失败
    acceptance_threshold: 0.85  # 通过阈值：任何匹配结果超过此值则提前结束并返回
    angle_matching_scale: 0.8   # 角度匹配时缩小尺寸的比例（0-1），用于加速计算，默认0.2

# 姿态估计参数（Python版本使用）
pose_estimator:
  brute_force_matching_enabled: true              # 是否启用暴力匹配模式
  brute_force_angle_step_deg: 1.0                 # 旋转匹配角度步进（度），减小以提高精度
  brute_force_max_threads: 4                      # 最大线程数（用于并行处理模板匹配）
  brute_force_rejection_threshold: 0.2            # 舍弃阈值：所有匹配结果低于此值则判定匹配失败
  brute_force_acceptance_threshold: 0.7           # 通过阈值：任何匹配结果超过此值则提前结束并返回
  brute_force_angle_matching_scale: 1.0           # 角度匹配时缩小尺寸的比例（0-1），1.0表示使用原始尺寸

# 模板库路径
template:
  root: "/home/mu/IVG/aubo_ros2_ws/src/visual_pose_estimation/templates"
  auto_save: true

# 调试选项
debug:
  enabled: true
  save_images: true
  log_level: "INFO"

